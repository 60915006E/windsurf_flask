{% extends "base.html" %}

{% block title %}進階搜尋 - Oracle 19c 資料查詢系統{% endblock %}

{% block extra_css %}
<style>
/* 進階搜尋頁面專用樣式 */
.advanced-search-container {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 2rem;
    background-color: white;
    border-radius: 12px;
    box-shadow: 0 4px 12px var(--shadow-light);
    border: 2px solid var(--border-color);
}

.page-header {
    text-align: center;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid var(--border-color);
}

.page-title {
    color: var(--text-primary);
    font-size: 2.2rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
}

.page-subtitle {
    color: var(--text-secondary);
    font-size: 1.1rem;
    font-weight: 400;
}

/* 邏輯選擇器樣式 */
.logic-selector {
    background-color: var(--card-bg);
    padding: 1.5rem;
    border-radius: 8px;
    margin-bottom: 2rem;
    border: 1px solid var(--border-color);
}

.logic-title {
    color: var(--text-primary);
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 1rem;
}

.logic-options {
    display: flex;
    gap: 2rem;
    align-items: center;
}

.logic-option {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    transition: all 0.3s ease;
}

.logic-option input[type="radio"] {
    width: 18px;
    height: 18px;
    accent-color: var(--primary-color);
}

.logic-option label {
    color: var(--text-primary);
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
}

.logic-option:hover {
    transform: translateY(-1px);
}

/* 搜尋條件區域 */
.search-conditions {
    margin-bottom: 2rem;
}

.conditions-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border-color);
}

.conditions-title {
    color: var(--text-primary);
    font-size: 1.2rem;
    font-weight: 600;
}

.add-condition-btn {
    background: linear-gradient(135deg, var(--accent-color), var(--warning-color));
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
}

.add-condition-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 8px var(--shadow-medium);
}

/* 條件列樣式 */
.condition-row {
    background-color: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    position: relative;
    transition: all 0.3s ease;
}

.condition-row:hover {
    box-shadow: 0 2px 6px var(--shadow-light);
}

.condition-content {
    display: grid;
    grid-template-columns: 1fr 1fr 2fr auto;
    gap: 1rem;
    align-items: center;
}

.condition-field, .condition-operator, .condition-value {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

.condition-field label, .condition-operator label, .condition-value label {
    color: var(--text-secondary);
    font-size: 0.9rem;
    font-weight: 600;
}

.condition-field select, .condition-operator select, .condition-value input {
    padding: 0.75rem;
    border: 2px solid var(--border-color);
    border-radius: 6px;
    font-size: 1rem;
    background-color: white;
    color: var(--text-primary);
    transition: all 0.3s ease;
}

.condition-field select:focus, .condition-operator select:focus, .condition-value input:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
}

.condition-value input {
    width: 100%;
}

.delete-condition-btn {
    background: linear-gradient(135deg, #FF6B6B, #FF8E8E);
    color: white;
    border: none;
    padding: 0.75rem 1rem;
    border-radius: 6px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    align-self: flex-end;
}

.delete-condition-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 6px rgba(255, 107, 107, 0.3);
}

/* 操作按鈕區域 */
.action-buttons {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 2px solid var(--border-color);
}

.btn-search, .btn-reset, .btn-back {
    padding: 1rem 2rem;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
}

.btn-search {
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    color: white;
    box-shadow: 0 4px 8px var(--shadow-light);
}

.btn-search:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px var(--shadow-medium);
}

.btn-reset {
    background: linear-gradient(135deg, var(--accent-color), var(--warning-color));
    color: white;
    box-shadow: 0 4px 8px var(--shadow-light);
}

.btn-reset:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px var(--shadow-medium);
}

.btn-back {
    background: linear-gradient(135deg, var(--text-secondary), var(--text-muted));
    color: white;
    box-shadow: 0 4px 8px var(--shadow-light);
}

.btn-back:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px var(--shadow-medium);
}

/* 空狀態提示 */
.empty-conditions {
    text-align: center;
    padding: 3rem;
    background-color: var(--card-bg);
    border-radius: 8px;
    border: 2px dashed var(--border-color);
}

.empty-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    color: var(--text-muted);
}

.empty-title {
    color: var(--text-primary);
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
}

.empty-message {
    color: var(--text-secondary);
    font-size: 1rem;
}

/* 響應式設計 */
@media (max-width: 768px) {
    .advanced-search-container {
        margin: 1rem;
        padding: 1.5rem;
    }
    
    .page-title {
        font-size: 1.8rem;
    }
    
    .logic-options {
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
    }
    
    .condition-content {
        grid-template-columns: 1fr;
        gap: 1rem;
    }
    
    .conditions-header {
        flex-direction: column;
        gap: 1rem;
        align-items: stretch;
    }
    
    .action-buttons {
        flex-direction: column;
        align-items: stretch;
    }
    
    .btn-search, .btn-reset, .btn-back {
        justify-content: center;
    }
}

@media (max-width: 480px) {
    .advanced-search-container {
        margin: 0.5rem;
        padding: 1rem;
    }
    
    .page-title {
        font-size: 1.5rem;
    }
    
    .condition-row {
        padding: 1rem;
    }
    
    .add-condition-btn {
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
    }
    
    .btn-search, .btn-reset, .btn-back {
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="advanced-search-container">
    <!-- 頁面標題 -->
    <div class="page-header">
        <h1 class="page-title">進階搜尋</h1>
        <p class="page-subtitle">使用多條件組合進行精確搜尋</p>
    </div>

    <!-- 邏輯選擇器 -->
    <div class="logic-selector">
        <h3 class="logic-title">搜尋邏輯</h3>
        <div class="logic-options">
            <div class="logic-option">
                <input type="radio" id="logic-and" name="search_logic" value="AND" checked>
                <label for="logic-and">AND 邏輯（所有條件都符合）</label>
            </div>
            <div class="logic-option">
                <input type="radio" id="logic-or" name="search_logic" value="OR">
                <label for="logic-or">OR 邏輯（任一條件符合）</label>
            </div>
        </div>
    </div>

    <!-- 搜尋條件區域 -->
    <div class="search-conditions">
        <div class="conditions-header">
            <h3 class="conditions-title">搜尋條件</h3>
            <button type="button" class="add-condition-btn" onclick="addCondition()">
                <span>➕</span>
                <span>增加條件</span>
            </button>
        </div>

        <!-- 條件列表容器 -->
        <div id="conditions-container">
            <!-- 初始條件將由 JavaScript 動態生成 -->
        </div>

        <!-- 空狀態提示 -->
        <div id="empty-conditions" class="empty-conditions">
            <div class="empty-icon">🔍</div>
            <h3 class="empty-title">尚未設定搜尋條件</h3>
            <p class="empty-message">點擊「增加條件」按鈕開始建立搜尋條件</p>
        </div>
    </div>

    <!-- 操作按鈕 -->
    <div class="action-buttons">
        <button type="button" class="btn-search" onclick="performSearch()">
            <span>🔍</span>
            <span>開始搜尋</span>
        </button>
        <button type="button" class="btn-reset" onclick="resetForm()">
            <span>🔄</span>
            <span>重設表單</span>
        </button>
        <a href="{{ url_for('index') }}" class="btn-back">
            <span>⬅️</span>
            <span>返回首頁</span>
        </a>
    </div>
</div>

<!-- 進階搜尋表單（隱藏） -->
<form id="advanced-search-form" method="POST" action="{{ url_for('search_advanced') }}" style="display: none;">
    <input type="hidden" id="search-conditions-data" name="conditions">
    <input type="hidden" id="search-logic-data" name="logic">
</form>
{% endblock %}

{% block extra_js %}
<script>
// 搜尋欄位對應表
const SEARCH_MAPPING = {
    '題名': 'title',
    '撰寫人': 'author',
    '編號': 'DOC_ID',
    '全部': 'ALL'
};

// 比較運算子選項
const OPERATORS = {
    '包含': 'LIKE',
    '等於': '=',
    '不等於': '!=',
    '開頭為': 'LIKE_START',
    '結尾為': 'LIKE_END',
    '大於': '>',
    '小於': '<',
    '大於等於': '>=',
    '小於等於': '<='
};

// 條件計數器
let conditionCounter = 0;

// 初始化頁面
document.addEventListener('DOMContentLoaded', function() {
    // 添加一個預設條件
    addCondition();
});

// 增加搜尋條件
function addCondition() {
    conditionCounter++;
    
    // 建立條件列元素
    const conditionRow = document.createElement('div');
    conditionRow.className = 'condition-row';
    conditionRow.id = `condition-${conditionCounter}`;
    
    // 建立條件內容
    const conditionContent = document.createElement('div');
    conditionContent.className = 'condition-content';
    
    // 欄位選擇器
    const fieldSelect = createFieldSelect();
    
    // 運算子選擇器
    const operatorSelect = createOperatorSelect();
    
    // 關鍵字輸入框
    const valueInput = createValueInput();
    
    // 刪除按鈕
    const deleteBtn = createDeleteButton(conditionCounter);
    
    // 組合條件內容
    conditionContent.appendChild(fieldSelect);
    conditionContent.appendChild(operatorSelect);
    conditionContent.appendChild(valueInput);
    conditionContent.appendChild(deleteBtn);
    
    conditionRow.appendChild(conditionContent);
    
    // 添加到容器
    const container = document.getElementById('conditions-container');
    container.appendChild(conditionRow);
    
    // 隱藏空狀態提示
    updateEmptyState();
}

// 建立欄位選擇器
function createFieldSelect() {
    const container = document.createElement('div');
    container.className = 'condition-field';
    
    const label = document.createElement('label');
    label.textContent = '搜尋欄位';
    
    const select = document.createElement('select');
    select.name = `field-${conditionCounter}`;
    
    // 添加選項
    Object.keys(SEARCH_MAPPING).forEach(fieldName => {
        const option = document.createElement('option');
        option.value = SEARCH_MAPPING[fieldName];
        option.textContent = fieldName;
        select.appendChild(option);
    });
    
    container.appendChild(label);
    container.appendChild(select);
    
    return container;
}

// 建立運算子選擇器
function createOperatorSelect() {
    const container = document.createElement('div');
    container.className = 'condition-operator';
    
    const label = document.createElement('label');
    label.textContent = '比較條件';
    
    const select = document.createElement('select');
    select.name = `operator-${conditionCounter}`;
    
    // 添加選項
    Object.keys(OPERATORS).forEach(operatorName => {
        const option = document.createElement('option');
        option.value = OPERATORS[operatorName];
        option.textContent = operatorName;
        select.appendChild(option);
    });
    
    container.appendChild(label);
    container.appendChild(select);
    
    return container;
}

// 建立關鍵字輸入框
function createValueInput() {
    const container = document.createElement('div');
    container.className = 'condition-value';
    
    const label = document.createElement('label');
    label.textContent = '關鍵字';
    
    const input = document.createElement('input');
    input.type = 'text';
    input.name = `value-${conditionCounter}`;
    input.placeholder = '請輸入搜尋關鍵字...';
    input.required = true;
    
    container.appendChild(label);
    container.appendChild(input);
    
    return container;
}

// 建立刪除按鈕
function createDeleteButton(id) {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'delete-condition-btn';
    button.onclick = () => deleteCondition(id);
    
    const icon = document.createElement('span');
    icon.textContent = '🗑️';
    
    const text = document.createElement('span');
    text.textContent = '刪除';
    
    button.appendChild(icon);
    button.appendChild(text);
    
    return button;
}

// 刪除條件
function deleteCondition(id) {
    const conditionRow = document.getElementById(`condition-${id}`);
    if (conditionRow) {
        conditionRow.remove();
        updateEmptyState();
    }
}

// 更新空狀態顯示
function updateEmptyState() {
    const container = document.getElementById('conditions-container');
    const emptyState = document.getElementById('empty-conditions');
    
    if (container.children.length === 0) {
        emptyState.style.display = 'block';
    } else {
        emptyState.style.display = 'none';
    }
}

// 重設表單
function resetForm() {
    // 清空所有條件
    const container = document.getElementById('conditions-container');
    container.innerHTML = '';
    
    // 重置計數器
    conditionCounter = 0;
    
    // 重置邏輯選擇
    document.getElementById('logic-and').checked = true;
    
    // 更新空狀態
    updateEmptyState();
    
    // 添加一個預設條件
    addCondition();
}

// 執行搜尋
function performSearch() {
    // 收集所有條件
    const conditions = [];
    const container = document.getElementById('conditions-container');
    
    for (let i = 1; i <= conditionCounter; i++) {
        const conditionRow = document.getElementById(`condition-${i}`);
        if (conditionRow) {
            const field = conditionRow.querySelector(`select[name="field-${i}"]`).value;
            const operator = conditionRow.querySelector(`select[name="operator-${i}"]`).value;
            const value = conditionRow.querySelector(`input[name="value-${i}"]`).value;
            
            if (value.trim()) {
                conditions.push({
                    field: field,
                    operator: operator,
                    value: value.trim()
                });
            }
        }
    }
    
    // 檢查是否有條件
    if (conditions.length === 0) {
        alert('請至少設定一個搜尋條件');
        return;
    }
    
    // 取得搜尋邏輯
    const logic = document.querySelector('input[name="search_logic"]:checked').value;
    
    // 設定表單資料
    document.getElementById('search-conditions-data').value = JSON.stringify(conditions);
    document.getElementById('search-logic-data').value = logic;
    
    // 提交表單
    document.getElementById('advanced-search-form').submit();
}

// 鍵盤快捷鍵支援
document.addEventListener('keydown', function(event) {
    // Ctrl+Enter 執行搜尋
    if (event.ctrlKey && event.key === 'Enter') {
        event.preventDefault();
        performSearch();
    }
    
    // Ctrl+R 重設表單
    if (event.ctrlKey && event.key === 'r') {
        event.preventDefault();
        resetForm();
    }
});
</script>
{% endblock %}
